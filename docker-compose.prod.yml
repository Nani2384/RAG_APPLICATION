version: "3.8"

services:
  db:
    image: postgres:15
    container_name: rag_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rag_db}
    # No public port exposing for security hardening in production
    expose:
      - "5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: rag_redis_prod
    restart: always
    # No public port exposing for security hardening in production
    expose:
      - "6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_api_prod
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    # No local host mounts for immutable production deployments
    expose:
      - "8000"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_celery_worker_prod
    restart: always
    command: celery -A app.worker.celery_app worker --loglevel=info
    # No local host mounts for immutable production deployments
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag_frontend_prod
    restart: always
    expose:
      - "3000"
    environment:
      # Browser fetches go through Nginx reverse proxy path /api
      - NEXT_PUBLIC_API_URL=/api
      - INTERNAL_API_URL=http://api:8000
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: rag_nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # SSL Certs volume mount for Let's Encrypt / Certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - api

volumes:
  postgres_prod_data:
  redis_prod_data:
